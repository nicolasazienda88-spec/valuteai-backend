<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ValuteAI</title>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMcr6LQ4bNJH2RWN50rXOrNGBQfl8sJ7Q",
  authDomain: "valuteai.firebaseapp.com",
  projectId: "valuteai",
  storageBucket: "valuteai.firebasestorage.app",
  messagingSenderId: "1029185632410",
  appId: "1:1029185632410:web:548fa60c6d36c09e3e8723",
  measurementId: "G-83TP23MLCE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
        alert("Registrazione completata!");
        closeLogin();
    })
    .catch((error) => {
        alert(error.message);
    });
}

window.login = function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {
        alert("Accesso effettuato!");
        closeLogin();
    })
    .catch((error) => {
        alert(error.message);
    });
}

window.currentUser = null;

onAuthStateChanged(auth, (user) => {
    window.currentUser = user || null;
});

</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0d0d0d;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */
nav{
    width:100%;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    z-index:999;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.4);
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#00ffd5;
}

.nav-links{
    display:flex;
    gap:15px;
}

.nav-links button{
    padding:12px 22px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.home-btn{background:#1e1e1e;color:white;}
.start-btn{background:#00ffd5;color:black;font-weight:bold;}
.pro-btn{background:gold;color:black;font-weight:bold;}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.hero h1{font-size:60px;}
.hero p{max-width:700px;color:#ccc;margin-top:20px;}

.hero button{
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:20px;
    background:#00ffd5;
    cursor:pointer;
}

/* ANALYSIS */
.analysis{
    padding:100px 20px;
    max-width:900px;
    margin:auto;
}

.form-box{
    background:#161616;
    padding:30px;
    border-radius:20px;
}

input,textarea,select{
    width:100%;
    margin-top:10px;
    padding:15px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
}

button{
    margin-top:15px;
    padding:15px;
    width:100%;
    border:none;
    background:#00ffd5;
    cursor:pointer;
    border-radius:10px;
}

.result-box{
    margin-top:20px;
    padding:20px;
    background:#111;
    border-radius:15px;
}

canvas{
    margin-top:20px;
    background:white;
    border-radius:10px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#161616;
    padding:30px;
    border-radius:20px;
    width:300px;
}

</style>
</head>

<body>

<nav>
    <div class="logo">ValuteAI</div>
    <div class="nav-links">
        <button class="home-btn">Home</button>
        <button class="start-btn" onclick="scrollToAnalysis()">Inizia</button>
        <button class="pro-btn" onclick="openLogin()">Accedi</button>
    </div>
</nav>

<section class="hero">
    <h1>ValuteAI</h1>
    <p>Scopri il valore dei tuoi oggetti con AI</p>
    <button onclick="scrollToAnalysis()">Inizia</button>
</section>

<section class="analysis" id="analysis">

<div class="form-box">

<input id="title" placeholder="Titolo">
<textarea id="description" placeholder="Descrizione"></textarea>

<select id="condition">
<option>Discrete</option>
<option>Buone</option>
<option>Ottime</option>
<option>Nuovo senza cartellino</option>
<option>Nuovo con cartellino</option>
</select>

<button onclick="analyzeAI()">Analizza con IA</button>

<div id="resultBox" class="result-box" style="display:none;">
<p id="estimatedPrice"></p>
<canvas id="priceChart"></canvas>
</div>

</div>

</section>

<script>

function scrollToAnalysis(){
document.getElementById("analysis").scrollIntoView({behavior:"smooth"});
}

async function analyzeAI(){

if(!window.currentUser){
alert("Accedi prima");
return;
}

const title=document.getElementById("title").value;
const description=document.getElementById("description").value;
const condition=document.getElementById("condition").value;

document.getElementById("resultBox").style.display="block";

const res=await fetch("/api/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title,description,condition})
});

const data=await res.json();

document.getElementById("estimatedPrice").innerHTML=data.result;

}

function openLogin(){
alert("Login già gestito sopra");
}

</script>

</body>
</html>
